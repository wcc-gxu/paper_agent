services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: paper_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paper_secret}
      POSTGRES_DB: paper_search
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "paper_admin", "-d", "paper_search"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    image: ghcr.io/wcc-gxu/paper_agant:${IMAGE_TAG:-latest}
    command: uvicorn paper_search.api.app:app --host 0.0.0.0 --port 8000
    # nginx 前端代理，API 不暴露外网端口
    # ports:
    #   - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://paper_admin:${POSTGRES_PASSWORD:-paper_secret}@postgres:5432/paper_search
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PAPER_USER_ID: ${PAPER_USER_ID:-default}
      LOGS_DIR: /var/log/paper_agent
    volumes:
      - papers:/root/papers
      - /oss:/oss
      - ./logs:/var/log/paper_agent
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    image: ghcr.io/wcc-gxu/paper_agant:${IMAGE_TAG:-latest}
    command: celery -A paper_search.agent.celery_app worker --loglevel=info --concurrency=4
    # 覆盖镜像继承的 curl :8000 healthcheck（worker 无 HTTP 服务）
    healthcheck:
      test: ["CMD-SHELL", "celery -A paper_search.agent.celery_app inspect ping -d celery@$$HOSTNAME --timeout 10 | grep -q pong"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    env_file: .env
    environment:
      DATABASE_URL: postgresql://paper_admin:${POSTGRES_PASSWORD:-paper_secret}@postgres:5432/paper_search
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PAPER_USER_ID: ${PAPER_USER_ID:-default}
      LOGS_DIR: /var/log/paper_agent
    volumes:
      - papers:/root/papers
      - /oss:/oss
      - ./logs:/var/log/paper_agent
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    image: ghcr.io/wcc-gxu/paper_agant:${IMAGE_TAG:-latest}
    command: celery -A paper_search.agent.celery_app beat --loglevel=info
    # beat 无 HTTP 服务，禁用镜像继承的 healthcheck
    healthcheck:
      disable: true
    env_file: .env
    environment:
      DATABASE_URL: postgresql://paper_admin:${POSTGRES_PASSWORD:-paper_secret}@postgres:5432/paper_search
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PAPER_USER_ID: ${PAPER_USER_ID:-default}
      LOGS_DIR: /var/log/paper_agent
    volumes:
      - papers:/root/papers
      - /oss:/oss
      - ./logs:/var/log/paper_agent
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  daemon:
    build: .
    image: ghcr.io/wcc-gxu/paper_agant:${IMAGE_TAG:-latest}
    command: python -m paper_search.agent.daemon
    # daemon 无 HTTP 服务，禁用镜像继承的 healthcheck
    healthcheck:
      disable: true
    env_file: .env
    environment:
      DATABASE_URL: postgresql://paper_admin:${POSTGRES_PASSWORD:-paper_secret}@postgres:5432/paper_search
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PAPER_USER_ID: ${PAPER_USER_ID:-default}
      LOGS_DIR: /var/log/paper_agent
    volumes:
      - papers:/root/papers
      - /oss:/oss
      - ./logs:/var/log/paper_agent
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  papers:
  redisdata:
