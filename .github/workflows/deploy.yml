name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 部署目标
        type: choice
        options: [test, production]
        default: test

jobs:
  deploy-test:
    if: github.event.inputs.environment == 'test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SSH_HOST }}
          username: ${{ secrets.TEST_SSH_USER }}
          key: ${{ secrets.TEST_SSH_KEY }}
          port: ${{ secrets.TEST_SSH_PORT || 22 }}
          script: |
            set -e
            cd /home/ubuntu/paper_agant
            export IMAGE_TAG=dev
            echo "=== Git pull ==="
            git fetch origin develop
            git checkout develop
            git reset --hard origin/develop
            echo ""
            echo "=== Pulling images ==="
            for i in 1 2 3; do
              if docker compose pull; then
                break
              fi
              echo "Pull failed, retrying... ($i/3)"
              sleep 5
            done
            echo ""
            echo "=== Starting services ==="
            docker compose up -d --remove-orphans
            docker compose restart nginx
            echo ""
            echo "=== Health check ==="
            sleep 5
            HEALTH_OK=false
            for i in $(seq 1 20); do
              if docker compose exec api curl -sf http://localhost:8000/api/health; then
                echo "Health check passed"
                HEALTH_OK=true
                break
              fi
              echo "Waiting... ($i/20)"
              sleep 3
            done
            if [ "$HEALTH_OK" = false ]; then
              echo "ERROR: Health check failed after 20 retries"
              echo "=== API logs (last 50 lines) ==="
              docker compose logs --tail 50 api
              echo "=== API container inspect ==="
              docker compose ps api
              exit 1
            fi
            echo ""
            echo "=== CORS check ==="
            sleep 3
            CORS_HEADER=$(docker compose exec api curl -sI http://nginx/api/health \
              -H "Origin: http://localhost:3000" 2>/dev/null | grep -i "Access-Control-Allow-Origin" || echo "MISSING")
            echo "CORS header: $CORS_HEADER"
            if echo "$CORS_HEADER" | grep -q "Access-Control-Allow-Origin"; then
              echo "CORS check passed: $CORS_HEADER"
            else
              echo "ERROR: CORS check failed"
              docker compose exec api curl -svI http://nginx/api/health \
                -H "Origin: http://localhost:3000" 2>&1 | head -20
              docker compose ps nginx
              exit 1
            fi
            echo ""
            echo "=== Service status ==="
            docker compose ps
            echo ""
            echo "=== Cleanup old Docker images ==="
            docker system prune -f

  deploy-prod:
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -e
            cd /home/ubuntu/paper_agant
            export IMAGE_TAG=latest
            echo "=== Git pull ==="
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            echo ""
            echo "=== Pulling images ==="
            for i in 1 2 3; do
              if docker compose pull; then
                break
              fi
              echo "Pull failed, retrying... ($i/3)"
              sleep 5
            done
            echo ""
            echo "=== Starting services ==="
            docker compose up -d --remove-orphans
            docker compose restart nginx
            echo ""
            echo "=== Health check ==="
            sleep 5
            HEALTH_OK=false
            for i in $(seq 1 20); do
              if docker compose exec api curl -sf http://localhost:8000/api/health; then
                echo "Health check passed"
                HEALTH_OK=true
                break
              fi
              echo "Waiting... ($i/20)"
              sleep 3
            done
            if [ "$HEALTH_OK" = false ]; then
              echo "ERROR: Health check failed after 20 retries"
              echo "=== API logs (last 50 lines) ==="
              docker compose logs --tail 50 api
              echo "=== API container inspect ==="
              docker compose ps api
              exit 1
            fi
            echo ""
            echo "=== CORS check ==="
            sleep 3
            CORS_HEADER=$(docker compose exec api curl -sI http://nginx/api/health \
              -H "Origin: http://localhost:3000" 2>/dev/null | grep -i "Access-Control-Allow-Origin" || echo "MISSING")
            echo "CORS header: $CORS_HEADER"
            if echo "$CORS_HEADER" | grep -q "Access-Control-Allow-Origin"; then
              echo "CORS check passed: $CORS_HEADER"
            else
              echo "ERROR: CORS check failed"
              docker compose exec api curl -svI http://nginx/api/health \
                -H "Origin: http://localhost:3000" 2>&1 | head -20
              docker compose ps nginx
              exit 1
            fi
            echo ""
            echo "=== Service status ==="
            docker compose ps
            echo ""
            echo "=== Cleanup old Docker images ==="
            docker system prune -f
