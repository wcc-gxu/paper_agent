name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

jobs:
  test-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev
      - run: python -m pip install -e ".[all]" pytest pytest-asyncio
      - run: PYTHONPATH=src python -m pytest tests/test_main_agent_safety_intent.py -v --tb=short

  test-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev
      - run: python -m pip install -e ".[all]" pytest pytest-asyncio
      - run: PYTHONPATH=src python -m pytest tests/test_celery_tasks.py -v --tb=short

  test-3:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev
      - run: python -m pip install -e ".[all]" pytest pytest-asyncio
      - run: PYTHONPATH=src python -m pytest tests/test_sub_agent_dispatch.py -v --tb=short

  test-4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev
      - run: python -m pip install -e ".[all]" pytest pytest-asyncio
      - run: PYTHONPATH=src python -m pytest tests/test_anti_hallucination.py -v --tb=short

  build-dev:
    needs: [test-1, test-2, test-4]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/paper_agant:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-prod:
    needs: [test-1, test-2, test-4]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/paper_agant:latest
            ghcr.io/${{ github.repository_owner }}/paper_agant:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
